name: Build A733 kernel debs

on:
  workflow_dispatch:
  push:
    branches:
      - a733-120hz
    paths:
      - '.github/workflows/build-a733-debs.yml'
      - 'openhd/**'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}

    steps:
      - name: Checkout kernel
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential cpio debhelper dpkg-dev fakeroot flex git kmod \
            libelf-dev libssl-dev lz4 pahole rsync xz-utils zstd \
            gcc-aarch64-linux-gnu

      - name: Checkout Allwinner BSP
        run: |
          git clone --depth 1 -b cubie-aiot-v1.4.6 \
            https://github.com/radxa/allwinner-bsp.git \
            /tmp/allwinner-bsp

      - name: Build Bullseye-compatible xz debs
        env:
          BSP_SOURCE: /tmp/allwinner-bsp
          VERSION_SUFFIX: 120hz-ci.${{ github.run_number }}
        run: |
          ./openhd/scripts/build-a733-120hz-debs.sh

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp ../repacked-xz/*.deb artifacts/
          ar t artifacts/linux-image-5.15.147-21-a733_*_xz.deb
          ls -lh artifacts

      - name: Upload xz deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: a733-linux-120hz-xz-debs-${{ github.run_number }}
          path: artifacts/*.deb
          if-no-files-found: error
          retention-days: 30

      - name: Push to Cloudsmith
        id: push
        uses: cloudsmith-io/action@master
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: push
          format: deb
          owner: openhd
          repo: ${{ github.ref_name }}
          distro: debian
          release: bullseye
          republish: true
          file: artifacts/*.deb
